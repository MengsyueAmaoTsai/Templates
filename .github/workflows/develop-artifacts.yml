name: Push to NuGet

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - develop

defaults:
  run:
    shell: pwsh

jobs:
  push-to-nuget:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet CLI
        uses: NuGet/setup-nuget@v1
        with:
          nuget-version: 'latest'

      - name: Generate version
        id: version
        run: echo "::set-output name=version::$(date +'%Y.%m.%d').$(echo $GITHUB_RUN_NUMBER)"

      - name: Pack templates
        run: nuget pack .\RichillCapital.Templates.nuspec -Version ${{ steps.version.outputs.version }} -Properties Configuration=Debug -OutputDirectory .\artifacts -NoDefaultExcludes -Verbosity normal 

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RichillCapital.Templates-${{ steps.version.outputs.version }}-Debug
          path: .\artifacts